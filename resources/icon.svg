<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#131b2e"/>
      <stop offset="100%" stop-color="#0a0d16"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#2ee6c8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2ee6c8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="drop" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#3ff0d4"/>
      <stop offset="48%" stop-color="#38a4ff"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="dropClip">
      <path d="M 512 118
        C 512 118 232 462 232 634
        A 280 280 0 0 0 792 634
        C 792 462 512 118 512 118 Z"/>
    </clipPath>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>
  <ellipse cx="512" cy="600" rx="430" ry="400" fill="url(#halo)"/>

  <!-- droplet -->
  <path d="M 512 118
    C 512 118 232 462 232 634
    A 280 280 0 0 0 792 634
    C 792 462 512 118 512 118 Z"
    fill="url(#drop)"/>

  <!-- audio wave inside the drop -->
  <g clip-path="url(#dropClip)">
    <path d="M 200 640
      C 260 560 320 560 380 640
      S 500 720 560 640
      S 680 560 740 640
      S 860 720 920 640"
      fill="none" stroke="#ffffff" stroke-width="46" stroke-linecap="round" opacity="0.92"/>
    <path d="M 200 640
      C 260 560 320 560 380 640
      S 500 720 560 640
      S 680 560 740 640
      S 860 720 920 640
      L 920 980 L 200 980 Z"
      fill="#0a0d16" opacity="0.28"/>
  </g>

  <!-- top-left highlight (clipped inside the drop) -->
  <g clip-path="url(#dropClip)">
    <ellipse cx="430" cy="335" rx="96" ry="150" fill="url(#shine)" transform="rotate(24 430 335)" filter="url(#soft)"/>
  </g>
</svg>
